name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONWARNINGS: "error::ResourceWarning"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pinned runtime dependencies
        run: "python -m pip install --only-binary=:all: --requirement requirements.txt"
      - name: Install this package without resolving dependencies
        run: python -m pip install --no-deps .
      - name: Run synthetic tests
        run: python -m unittest discover -s tests -v
      - name: Check the installed command
        run: tvtime-extractor --help

  quality:
    name: Lint, format, and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install pinned development tools
        run: "python -m pip install --only-binary=:all: --requirement requirements-dev.txt"
      - name: Lint
        run: python -m ruff check .
      - name: Check formatting
        run: python -m ruff format --check .
      - name: Build wheel and source distribution
        run: python -m build --no-isolation
      - name: Smoke-test the wheel in an isolated environment
        run: |
          python -m venv .package-smoke
          .package-smoke/bin/python -m pip install --no-deps dist/*.whl
          .package-smoke/bin/tvtime-extractor --help
